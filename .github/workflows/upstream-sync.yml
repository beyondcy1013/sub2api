name: Sync Upstream

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'beyondcy1013/sub2api'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Merge upstream main
        id: merge
        run: |
          git remote add upstream-sync https://github.com/Wei-Shaw/sub2api.git
          git fetch --no-tags upstream-sync main

          if git merge-base --is-ancestor upstream-sync/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Fork main already contains upstream main."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-ff --no-edit upstream-sync/main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        if: steps.merge.outputs.changed == 'true'
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run backend unit tests
        if: steps.merge.outputs.changed == 'true'
        working-directory: backend
        run: make test-unit

      - name: Run backend integration tests
        if: steps.merge.outputs.changed == 'true'
        working-directory: backend
        run: make test-integration

      - name: Set up pnpm
        if: steps.merge.outputs.changed == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Node.js
        if: steps.merge.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        if: steps.merge.outputs.changed == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend checks
        if: steps.merge.outputs.changed == 'true'
        working-directory: frontend
        run: |
          pnpm lint:check
          pnpm typecheck
          pnpm vitest run
          pnpm build

      - name: Build embedded backend
        if: steps.merge.outputs.changed == 'true'
        working-directory: backend
        run: CGO_ENABLED=0 go build -tags embed -o /tmp/sub2api ./cmd/server

      - name: Push tested merge
        if: steps.merge.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 --wrap=0)"
          git -c "http.extraheader=AUTHORIZATION: basic $auth_header" push origin HEAD:main
